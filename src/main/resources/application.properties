spring.application.name=aprendeaprueba
server.port=${PORT:8080}
spring.servlet.multipart.max-file-size=6MB
spring.servlet.multipart.max-request-size=7MB

ia.api.key=${IA_API_KEY}
ia.api.url=${IA_API_URL:https://openrouter.ai/api/v1/chat/completions}
ia.model.vision=${IA_VISION_MODEL:${IA_MODEL:nvidia/nemotron-nano-12b-v2-vl:free}}
ia.model.texto=${IA_TEXT_MODEL:${IA_MODEL:nvidia/nemotron-nano-12b-v2-vl:free}}
ia.limite.resumen=${IA_LIMITE_RESUMEN:8000}
ia.limite.test=${IA_LIMITE_TEST:7000}
ia.max-tokens.resumen=${IA_MAX_TOKENS_RESUMEN:1800}

firebase.database.url=${FIREBASE_DATABASE_URL}
